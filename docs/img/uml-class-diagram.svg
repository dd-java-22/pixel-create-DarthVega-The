<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .class-box { fill: #f9f9f9; stroke: #333; stroke-width: 2; }
      .class-title { fill: #4a90e2; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .class-attr { fill: #333; font-family: 'Courier New', monospace; font-size: 10px; }
      .class-method { fill: #333; font-family: 'Courier New', monospace; font-size: 9px; }
      .section-line { stroke: #333; stroke-width: 1; }
      .relationship { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .relationship-label { fill: #666; font-family: Arial, sans-serif; font-size: 11px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="900" y="25" text-anchor="middle" style="font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #333;">UML Class Diagram</text>

  <!-- User Class -->
  <g id="User">
    <rect x="50" y="50" width="280" height="280" class="class-box" rx="5"/>
    <text x="190" y="72" text-anchor="middle" class="class-title">User</text>
    <line x1="50" y1="80" x2="330" y2="80" class="section-line"/>
    <text x="60" y="95" class="class-attr">- id: long</text>
    <text x="60" y="107" class="class-attr">- username: String</text>
    <text x="60" y="119" class="class-attr">- email: String</text>
    <text x="60" y="131" class="class-attr">- authToken: String</text>
    <text x="60" y="143" class="class-attr">- defaultCanvasWidth: int</text>
    <text x="60" y="155" class="class-attr">- defaultCanvasHeight: int</text>
    <text x="60" y="167" class="class-attr">- themePreference: String</text>
    <text x="60" y="179" class="class-attr">- gridVisibility: boolean</text>
    <text x="60" y="191" class="class-attr">- zoomSensitivity: float</text>
    <text x="60" y="203" class="class-attr">- createdAt: Instant</text>
    <text x="60" y="215" class="class-attr">- lastLogin: Instant</text>
    <line x1="50" y1="223" x2="330" y2="223" class="section-line"/>
    <text x="60" y="238" class="class-method">+ getId(), setId(), getUsername()</text>
    <text x="60" y="250" class="class-method">+ getEmail(), getAuthToken()</text>
    <text x="60" y="262" class="class-method">+ getThemePreference()</text>
    <text x="60" y="274" class="class-method">+ isGridVisibility()</text>
    <text x="60" y="286" class="class-method">+ getZoomSensitivity()</text>
    <text x="60" y="298" class="class-method">+ getCreatedAt(), getLastLogin()</text>
    <text x="60" y="310" class="class-method">+ (setters...)</text>
  </g>

  <!-- Project Class -->
  <g id="Project">
    <rect x="430" y="50" width="280" height="260" class="class-box" rx="5"/>
    <text x="570" y="72" text-anchor="middle" class="class-title">Project</text>
    <line x1="430" y1="80" x2="710" y2="80" class="section-line"/>
    <text x="440" y="95" class="class-attr">- id: long</text>
    <text x="440" y="107" class="class-attr">- userId: long</text>
    <text x="440" y="119" class="class-attr">- projectName: String</text>
    <text x="440" y="131" class="class-attr">- canvasWidth: int</text>
    <text x="440" y="143" class="class-attr">- canvasHeight: int</text>
    <text x="440" y="155" class="class-attr">- createdAt: Instant</text>
    <text x="440" y="167" class="class-attr">- lastEditedAt: Instant</text>
    <text x="440" y="179" class="class-attr">- thumbnailImage: byte[]</text>
    <text x="440" y="191" class="class-attr">- isDeleted: boolean</text>
    <text x="440" y="203" class="class-attr">- tags: String</text>
    <line x1="430" y1="211" x2="710" y2="211" class="section-line"/>
    <text x="440" y="226" class="class-method">+ getId(), setId(), getUserId()</text>
    <text x="440" y="238" class="class-method">+ getProjectName()</text>
    <text x="440" y="250" class="class-method">+ getCanvasWidth(), getCanvasHeight()</text>
    <text x="440" y="262" class="class-method">+ getThumbnailImage(), isDeleted()</text>
    <text x="440" y="274" class="class-method">+ getTags(), getCreatedAt()</text>
    <text x="440" y="286" class="class-method">+ (setters...)</text>
  </g>

  <!-- Layer Class -->
  <g id="Layer">
    <rect x="800" y="50" width="280" height="240" class="class-box" rx="5"/>
    <text x="940" y="72" text-anchor="middle" class="class-title">Layer</text>
    <line x1="800" y1="80" x2="1080" y2="80" class="section-line"/>
    <text x="810" y="95" class="class-attr">- id: long</text>
    <text x="810" y="107" class="class-attr">- projectId: long</text>
    <text x="810" y="119" class="class-attr">- layerName: String</text>
    <text x="810" y="131" class="class-attr">- layerOrder: int</text>
    <text x="810" y="143" class="class-attr">- isVisible: boolean</text>
    <text x="810" y="155" class="class-attr">- isLocked: boolean</text>
    <text x="810" y="167" class="class-attr">- opacity: float</text>
    <text x="810" y="179" class="class-attr">- createdAt: Instant</text>
    <line x1="800" y1="187" x2="1080" y2="187" class="section-line"/>
    <text x="810" y="202" class="class-method">+ getId(), setId()</text>
    <text x="810" y="214" class="class-method">+ getProjectId(), getLayerName()</text>
    <text x="810" y="226" class="class-method">+ getLayerOrder(), isVisible()</text>
    <text x="810" y="238" class="class-method">+ isLocked(), getOpacity()</text>
    <text x="810" y="250" class="class-method">+ getCreatedAt()</text>
    <text x="810" y="262" class="class-method">+ (setters...)</text>
  </g>

  <!-- Pixel Class -->
  <g id="Pixel">
    <rect x="1170" y="50" width="280" height="200" class="class-box" rx="5"/>
    <text x="1310" y="72" text-anchor="middle" class="class-title">Pixel</text>
    <line x1="1170" y1="80" x2="1450" y2="80" class="section-line"/>
    <text x="1180" y="95" class="class-attr">- id: long</text>
    <text x="1180" y="107" class="class-attr">- layerId: long</text>
    <text x="1180" y="119" class="class-attr">- xCoordinate: int</text>
    <text x="1180" y="131" class="class-attr">- yCoordinate: int</text>
    <text x="1180" y="143" class="class-attr">- colorValue: int</text>
    <text x="1180" y="155" class="class-attr">- lastModified: Instant</text>
    <line x1="1170" y1="163" x2="1450" y2="163" class="section-line"/>
    <text x="1180" y="178" class="class-method">+ getId(), setId(), getLayerId()</text>
    <text x="1180" y="190" class="class-method">+ getXCoordinate(), getYCoordinate()</text>
    <text x="1180" y="202" class="class-method">+ getColorValue(), getLastModified()</text>
    <text x="1180" y="214" class="class-method">+ (setters...)</text>
  </g>

  <!-- Palette Class -->
  <g id="Palette">
    <rect x="50" y="420" width="280" height="200" class="class-box" rx="5"/>
    <text x="190" y="442" text-anchor="middle" class="class-title">Palette</text>
    <line x1="50" y1="450" x2="330" y2="450" class="section-line"/>
    <text x="60" y="465" class="class-attr">- id: long</text>
    <text x="60" y="477" class="class-attr">- userId: long</text>
    <text x="60" y="489" class="class-attr">- paletteName: String</text>
    <text x="60" y="501" class="class-attr">- isDefault: boolean</text>
    <text x="60" y="513" class="class-attr">- createdAt: Instant</text>
    <text x="60" y="525" class="class-attr">- lastUsed: Instant</text>
    <line x1="50" y1="533" x2="330" y2="533" class="section-line"/>
    <text x="60" y="548" class="class-method">+ getId(), setId(), getUserId()</text>
    <text x="60" y="560" class="class-method">+ getPaletteName(), isDefault()</text>
    <text x="60" y="572" class="class-method">+ getCreatedAt(), getLastUsed()</text>
    <text x="60" y="584" class="class-method">+ (setters...)</text>
  </g>

  <!-- PaletteColor Class -->
  <g id="PaletteColor">
    <rect x="430" y="420" width="280" height="180" class="class-box" rx="5"/>
    <text x="570" y="442" text-anchor="middle" class="class-title">PaletteColor</text>
    <line x1="430" y1="450" x2="710" y2="450" class="section-line"/>
    <text x="440" y="465" class="class-attr">- id: long</text>
    <text x="440" y="477" class="class-attr">- paletteId: long</text>
    <text x="440" y="489" class="class-attr">- colorValue: int</text>
    <text x="440" y="501" class="class-attr">- colorOrder: int</text>
    <text x="440" y="513" class="class-attr">- colorName: String</text>
    <line x1="430" y1="521" x2="710" y2="521" class="section-line"/>
    <text x="440" y="536" class="class-method">+ getId(), setId()</text>
    <text x="440" y="548" class="class-method">+ getPaletteId(), getColorValue()</text>
    <text x="440" y="560" class="class-method">+ getColorOrder(), getColorName()</text>
    <text x="440" y="572" class="class-method">+ (setters...)</text>
  </g>

  <!-- ExportHistory Class -->
  <g id="ExportHistory">
    <rect x="800" y="400" width="300" height="230" class="class-box" rx="5"/>
    <text x="950" y="422" text-anchor="middle" class="class-title">ExportHistory</text>
    <line x1="800" y1="430" x2="1100" y2="430" class="section-line"/>
    <text x="810" y="445" class="class-attr">- id: long</text>
    <text x="810" y="457" class="class-attr">- projectId: long</text>
    <text x="810" y="469" class="class-attr">- fileName: String</text>
    <text x="810" y="481" class="class-attr">- filePath: String</text>
    <text x="810" y="493" class="class-attr">- fileFormat: String</text>
    <text x="810" y="505" class="class-attr">- resolution: int</text>
    <text x="810" y="517" class="class-attr">- scaleFactor: int</text>
    <text x="810" y="529" class="class-attr">- exportedAt: Instant</text>
    <text x="810" y="541" class="class-attr">- fileSizeBytes: int</text>
    <line x1="800" y1="549" x2="1100" y2="549" class="section-line"/>
    <text x="810" y="564" class="class-method">+ getId(), setId(), getProjectId()</text>
    <text x="810" y="576" class="class-method">+ getFileName(), getFilePath()</text>
    <text x="810" y="588" class="class-method">+ getFileFormat(), getResolution()</text>
    <text x="810" y="600" class="class-method">+ getScaleFactor(), getExportedAt()</text>
    <text x="810" y="612" class="class-method">+ (setters...)</text>
  </g>

  <!-- AutosaveSnapshot Class -->
  <g id="AutosaveSnapshot">
    <rect x="1170" y="400" width="300" height="190" class="class-box" rx="5"/>
    <text x="1320" y="422" text-anchor="middle" class="class-title">AutosaveSnapshot</text>
    <line x1="1170" y1="430" x2="1470" y2="430" class="section-line"/>
    <text x="1180" y="445" class="class-attr">- id: long</text>
    <text x="1180" y="457" class="class-attr">- projectId: long</text>
    <text x="1180" y="469" class="class-attr">- snapshotData: byte[]</text>
    <text x="1180" y="481" class="class-attr">- createdAt: Instant</text>
    <text x="1180" y="493" class="class-attr">- fileSize: int</text>
    <line x1="1170" y1="501" x2="1470" y2="501" class="section-line"/>
    <text x="1180" y="516" class="class-method">+ getId(), setId()</text>
    <text x="1180" y="528" class="class-method">+ getProjectId()</text>
    <text x="1180" y="540" class="class-method">+ getSnapshotData()</text>
    <text x="1180" y="552" class="class-method">+ getCreatedAt(), getFileSize()</text>
    <text x="1180" y="564" class="class-method">+ (setters...)</text>
  </g>

  <!-- Relationships -->

  <!-- User to Project (1 to 0..*) -->
  <path d="M 330 180 L 430 180" class="relationship"/>
  <text x="338" y="170" class="relationship-label">1</text>
  <text x="400" y="170" class="relationship-label">0..*</text>
  <text x="362" y="195" class="relationship-label" font-style="italic">has</text>

  <!-- User to Palette (1 to 0..*) -->
  <path d="M 190 330 L 190 420" class="relationship"/>
  <text x="200" y="345" class="relationship-label">1</text>
  <text x="200" y="405" class="relationship-label">0..*</text>
  <text x="200" y="375" class="relationship-label" font-style="italic">has</text>

  <!-- Project to Layer (1 to 1..*) -->
  <path d="M 710 150 L 800 150" class="relationship"/>
  <text x="718" y="140" class="relationship-label">1</text>
  <text x="770" y="140" class="relationship-label">1..*</text>
  <text x="740" y="165" class="relationship-label" font-style="italic">has</text>

  <!-- Project to ExportHistory (1 to 0..*) -->
  <path d="M 570 310 L 570 360 L 950 360 L 950 400" class="relationship"/>
  <text x="578" y="325" class="relationship-label">1</text>
  <text x="958" y="385" class="relationship-label">0..*</text>
  <text x="750" y="350" class="relationship-label" font-style="italic">has</text>

  <!-- Project to AutosaveSnapshot (1 to 0..*) -->
  <path d="M 710 230 L 740 230 L 740 360 L 1320 360 L 1320 400" class="relationship"/>
  <text x="718" y="220" class="relationship-label">1</text>
  <text x="1328" y="385" class="relationship-label">0..*</text>
  <text x="1010" y="350" class="relationship-label" font-style="italic">has</text>

  <!-- Layer to Pixel (1 to 0..*) -->
  <path d="M 1080 150 L 1170 150" class="relationship"/>
  <text x="1088" y="140" class="relationship-label">1</text>
  <text x="1140" y="140" class="relationship-label">0..*</text>
  <text x="1100" y="165" class="relationship-label" font-style="italic">contains</text>

  <!-- Palette to PaletteColor (1 to 0..*) -->
  <path d="M 330 510 L 430 510" class="relationship"/>
  <text x="338" y="500" class="relationship-label">1</text>
  <text x="400" y="500" class="relationship-label">0..*</text>
  <text x="362" y="525" class="relationship-label" font-style="italic">has</text>

  <!-- Legend -->
  <g id="Legend">
    <rect x="50" y="680" width="300" height="100" fill="#f0f0f0" stroke="#666" stroke-width="1" rx="5"/>
    <text x="60" y="700" style="font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333;">Legend</text>
    <line x1="60" y1="715" x2="120" y2="715" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="130" y="720" style="font-family: Arial, sans-serif; font-size: 11px; fill: #333;">Association</text>
    <text x="60" y="740" style="font-family: Arial, sans-serif; font-size: 11px; fill: #333;">1 = One</text>
    <text x="60" y="755" style="font-family: Arial, sans-serif; font-size: 11px; fill: #333;">0..* = Zero or many</text>
    <text x="60" y="770" style="font-family: Arial, sans-serif; font-size: 11px; fill: #333;">1..* = One or many</text>
  </g>
</svg>
